# Makes hyprsunset do nothing to the screen by default
# Without this, the default applies some tint to the monitor
profile {
    time = 09:00
    identity = true
}

# To enable auto switch to nightlight, set in your .config/hypr/autostart:
# exec-once = uwsm app -- hyprsunset
# and use the following:
profile {
    time = 06:00
    temperature = 6500 # Daylight (normal)
}
profile {
    time = 08:00
    temperature = 5500 # Slightly warmer
}
profile {
    time = 09:00
    identity = true # No effect (as in your original)
}
profile {
    time = 17:00
    temperature = 5000 # Start warming up
}
profile {
    time = 18:00
    temperature = 4000 # Nightlight
}
profile {
    time = 20:00
    temperature = 3500 # Even warmer
}
profile {
    time = 22:00
    temperature = 3000 # Maximum warmth
}
profile {
    time = 23:59
    temperature = 6500 # Reset to normal for next day
}
